name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    name: Format + lint code
    runs-on: ubuntu-latest
    # Reverse order of check until all mypy check routinely pass
    # A more appropriate order would be pre-commit first then unittests
    needs: [checks]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.0
        with:
          extra_args: --hook-stage manual --all-files

  checks:
    name: Run tests for Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    # Reverse order of check until all mypy check routinely pass
    # needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]  # test oldest and latest supported versions
        runs-on: [ubuntu-latest, macos-latest]  # can be extended to other OSes, e.g. [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package
        run: python -m pip install . --group dev

      - name: Test package
        run: >-
          python -m pytest -ra --cov --cov-report=xml --cov-report=term
          --durations=20

      - name: Upload coverage report
        uses: codecov/codecov-action@v3.1.4

  no-html-smoke:
    name: CLI works without the optional 'html' extra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      # Install the core package only — no 'html' extra and no dev group, so
      # pandas/tabulate are absent. This exercises the guarded, lazy import of
      # rcpond.analytics and confirms the rest of the CLI works without 'html'.
      - name: Install core package only
        run: python -m pip install .

      - name: Verify the CLI imports and runs without pandas/tabulate
        run: |
          python -c "import importlib.util as u; assert u.find_spec('pandas') is None, 'pandas must be absent for this check'"
          python -c "import rcpond.cli, rcpond.command"
          rcpond --help
